# inspired by https://thevaluable.dev/tmux-config-mouseless/

# Use C-Space as prefix
set -g prefix 'C-Space'
unbind C-b
bind 'C-Space' send-prefix

set -g default-shell /bin/zsh
if-shell '[ "$(uname)" = "Darwin" ]' "set -g default-command 'reattach-to-user-namespace -l zsh'"

# Enable mouse
set -g mouse on

# Set window title format
set-option -g automatic-rename on
set-option -g automatic-rename-format '#(basename "#{pane_current_path}")'
set-option -g status-interval 1

set-window-option -g mode-keys vi
# Set to xterm-256color to ensure it worsk in iterm2
set -g default-terminal "xterm-256color"
set-environment -g TMPDIR "$TMPDIR"

# Fast reload tmux configuration
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# More ergonomic split bindings than tmux's default % and "
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Configure copy-mode to use v for selection and y for yank
unbind -T copy-mode-vi Space; #Default for begin-selection
unbind -T copy-mode-vi Enter; #Default for copy-selection

bind -T copy-mode-vi v send-keys -X begin-selection

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @yank_selection_mouse 'clipboard'
set -g @yank_selection 'clipboard'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Quick pane navigation is handled by vim-tmux-navigator so Alt+h/j/k/l
# works across tmux panes and Neovim splits.
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_left "M-h"
set -g @vim_navigator_mapping_down "M-j"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_prev ""
set -g @vim_navigator_prefix_mapping_clear_screen ""

# Configure Dracula
set -g @dracula-day-month true
set -g @dracula-show-fahrenheit false
set -g @dracula-border-contrast true
set -g @dracula-show-powerline true
set -g @dracula-show-flags true


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
